  summary: Hands-on technology leader with 20+ years spanning market data infrastructure and quantitative finance — uniquely positioned at the intersection of both. Built foundational market data systems at Bloomberg as a data provider, then crossed to the buy-side at Guggenheim to build front-office quant research and trading infrastructure as a data consumer. Since then consistently hired to build or transform technology at the intersection of systematic trading, market data, and quant research.

